<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - CarSorte</title>

<style>
:root{
--bg:#050505;
--panel:#101010;
--gold:#d4a017;
--gold-soft:#f4c542;
--text:#ffffff;
--muted:#b8b8b8;
--line:rgba(255,255,255,.08);
--shadow:0 14px 34px rgba(0,0,0,.32);
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
height:70px;
}

.logo strong{
font-size:28px;
color:var(--gold-soft);
}

.grid{
display:grid;
grid-template-columns:1fr 420px;
gap:30px;
}

.box{
background:var(--panel);
border:1px solid var(--line);
border-radius:20px;
padding:24px;
box-shadow:var(--shadow);
}

.box h2{
margin-top:0;
font-size:28px;
}

.vehicle{
display:flex;
gap:20px;
margin-top:16px;
}

.vehicle img{
width:160px;
border-radius:12px;
}

.vehicle-info h3{
margin:0;
font-size:24px;
}

.vehicle-info p{
color:var(--muted);
margin-top:6px;
}

.pack{
margin-top:20px;
padding:16px;
border:1px solid var(--line);
border-radius:14px;
background:#0b0b0b;
}

.pack strong{
font-size:24px;
color:var(--gold-soft);
}

.form{
margin-top:20px;
display:grid;
gap:14px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid var(--line);
background:#0b0b0b;
color:white;
}

.summary{
display:grid;
gap:12px;
margin-top:20px;
}

.row{
display:flex;
justify-content:space-between;
}

.total{
font-size:22px;
font-weight:800;
color:var(--gold-soft);
}

.btn{
display:block;
text-align:center;
padding:16px;
border-radius:12px;
font-weight:800;
margin-top:20px;
cursor:pointer;
}

.btn-primary{
background:var(--gold);
color:black;
}

.secure{
margin-top:18px;
font-size:13px;
color:#aaa;
text-align:center;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
<img src="logo-carsorte.png">
<strong>CarSorte</strong>
</div>

<div>
Checkout seguro
</div>

</div>


<div class="grid">


<div class="box">

<h2>Detalhes do participante</h2>

<div class="form">

<input placeholder="Nome completo">

<input placeholder="Email">

<input placeholder="Telefone">

<input placeholder="Cidade">

</div>

</div>



<div class="box">

<h2>Resumo do pedido</h2>

<div class="vehicle">

<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e">

<div class="vehicle-info">

<h3>BMW Série 1 Pack M</h3>

<p>Sorteio premium CarSorte</p>

</div>

</div>


<div class="pack">

<strong id="tickets">5 bilhetes</strong>

<div style="color:#aaa;margin-top:4px;">
Pack promoção
</div>

</div>


<div class="summary">

<div class="row">
<span>Preço bilhete</span>
<span>2,50€</span>
</div>

<div class="row">
<span>Quantidade</span>
<span id="qty">5</span>
</div>

<div class="row total">
<span>Total</span>
<span id="price">10€</span>
</div>

</div>


<a class="btn btn-primary" href="checkout-success.html">
Confirmar participação
</a>

<div class="secure">
Pagamento protegido • Bilhetes únicos • Resultado público
</div>

</div>

</div>

</div>


<script>

const params = new URLSearchParams(window.location.search);
const pack = params.get("pack");

let qty = 1;
let price = 2.5;

if(pack == "5"){
qty = 5;
price = 10;
}

if(pack == "15"){
qty = 15;
price = 25;
}

document.getElementById("qty").innerText = qty;
document.getElementById("tickets").innerText = qty + " bilhetes";
document.getElementById("price").innerText = price + "€";

</script>

</body>
</html>

<!doctype html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

<style>

body{
background:#060606;
color:white;
font-family:Arial;
margin:0;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
color:#f4c542;
}

.card{
background:#111;
padding:25px;
border-radius:15px;
border:1px solid rgba(255,255,255,.08);
margin-top:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.stat{
background:#111;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
text-align:center;
}

button{
margin-top:20px;
padding:14px 22px;
border:none;
border-radius:10px;
background:#f4c542;
font-weight:bold;
cursor:pointer;
}

.winner{
margin-top:20px;
background:#0b0b0b;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>Painel Admin</h1>

<div class="stats">

<div class="stat">
<strong>BMW Série 1</strong>
<br>
Sorteio ativo
</div>

<div class="stat">
<strong>11257</strong>
<br>
Bilhetes vendidos
</div>

<div class="stat">
<strong>15000</strong>
<br>
Bilhetes totais
</div>

</div>

<div class="card">

<h2>Tirar vencedor</h2>

<p>Clique no botão para sortear um bilhete vencedor.</p>

<button onclick="drawWinner()">Sortear vencedor</button>

<div id="winner" class="winner" style="display:none"></div>

</div>

<a href="index.html" style="color:#f4c542">Voltar ao site</a>

</div>

<script>

function generateTickets(total){

const tickets=[]

for(let i=1;i<=total;i++){

let num=i.toString().padStart(5,"0")

tickets.push("#CS-"+num)

}

return tickets

}

function drawWinner(){

const tickets = generateTickets(15000)

const index = Math.floor(Math.random()*tickets.length)

const winner = tickets[index]

const box=document.getElementById("winner")

box.style.display="block"

box.innerHTML="🎉 Bilhete vencedor: <strong>"+winner+"</strong>"

}

</script>

</body>
</html>

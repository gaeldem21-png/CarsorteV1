<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registo · CarSorte</title>
  <style>
    :root{
      --bg:#060606;
      --panel:#111111;
      --gold:#f4c542;
      --text:#ffffff;
      --muted:#a9a9a9;
      --line:rgba(255,255,255,.08);
      --shadow:0 18px 40px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(244,197,66,.12), transparent 28%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    a{text-decoration:none;color:inherit}
    .card{
      width:100%;
      max-width:520px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      padding:30px;
      box-shadow:var(--shadow);
    }
    .logo{
      width:56px;height:56px;border-radius:18px;background:var(--gold);color:#000;
      display:grid;place-items:center;font-size:28px;font-weight:900;margin-bottom:16px;
    }
    h1{margin:0 0 8px 0;font-size:38px;color:var(--gold)}
    p{margin:0 0 18px 0;color:var(--muted);line-height:1.7}
    .form{display:grid;gap:14px}
    input,select{
      width:100%;
      background:#0b0b0b;
      border:1px solid var(--line);
      color:#fff;
      padding:14px 16px;
      border-radius:16px;
      outline:none;
    }
    .btn{
      display:inline-block;
      text-align:center;
      background:var(--gold);
      color:#000;
      padding:15px 18px;
      border-radius:16px;
      font-weight:900;
      margin-top:6px;
    }
    .links{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:#d7d7d7;
      font-size:14px;
    }
    .links a:hover{color:var(--gold)}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📝</div>
    <h1>Criar conta</h1>
    <p>Crie a sua conta CarSorte para comprar bilhetes, acompanhar sorteios e guardar o seu histórico.</p>

    <div class="form">
      <input type="text" placeholder="Nome completo" />
      <input type="email" placeholder="Email" />
      <input type="tel" placeholder="Telefone" />
      <select>
        <option>Cidade</option>
        <option>Porto</option>
        <option>Lisboa</option>
        <option>Braga</option>
        <option>Coimbra</option>
      </select>
      <input type="password" placeholder="Palavra-passe" />
      <input type="password" placeholder="Confirmar palavra-passe" />
      <a class="btn" href="utilizador.html">Criar conta</a>
    </div>

    <div class="links">
      <a href="login.html">Já tenho conta</a>
      <a href="index.html">Voltar ao site</a>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo · CarSorte</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#060606;
      color:white;
      min-height:100vh;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    header{
      background:#111;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    nav{
      max-width:1200px;
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      padding:20px;
    }

    .logo{
      color:#f4c542;
      font-size:24px;
      font-weight:bold;
      white-space:nowrap;
    }

    .menu{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:18px;
    }

    .menu a{
      color:white;
      font-size:16px;
    }

    .wrapper{
      max-width:1200px;
      margin:auto;
      padding:50px 20px 70px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .card{
      width:100%;
      max-width:560px;
      background:#111;
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:32px;
      box-shadow:0 12px 28px rgba(0,0,0,.28);
    }

    .icon{
      width:62px;
      height:62px;
      border-radius:18px;
      background:#f4c542;
      color:black;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      font-weight:bold;
      margin-bottom:18px;
    }

    h1{
      margin:0 0 10px 0;
      font-size:38px;
      color:#f4c542;
    }

    p{
      margin:0 0 22px 0;
      color:#cfcfcf;
      line-height:1.7;
      font-size:16px;
    }

    .form{
      display:grid;
      gap:14px;
    }

    .form input,
    .form select{
      width:100%;
      background:#0b0b0b;
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:14px 16px;
      color:white;
      font-size:16px;
      outline:none;
    }

    .btn{
      display:inline-block;
      text-align:center;
      background:#f4c542;
      color:black;
      padding:15px 18px;
      border-radius:12px;
      font-weight:bold;
      font-size:16px;
      margin-top:4px;
    }

    .links{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:#d7d7d7;
      font-size:14px;
    }

    .links a:hover{
      color:#f4c542;
    }

    @media (max-width:900px){
      nav{
        flex-direction:column;
        align-items:flex-start;
      }

      .menu{
        justify-content:flex-start;
        gap:14px;
      }

      .wrapper{
        padding:30px 16px 50px;
      }

      .card{
        padding:24px;
      }

      h1{
        font-size:30px;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <div class="logo">CarSorte</div>

      <div class="menu">
        <a href="index.html">Início</a>
        <a href="raffle.html">Sorteio</a>
        <a href="results.html">Resultados</a>
        <a href="faq.html">FAQ</a>
        <a href="admin.html">Admin</a>
      </div>
    </nav>
  </header>

  <div class="wrapper">
    <div class="card">
      <div class="icon">📝</div>
      <h1>Criar conta</h1>
      <p>Crie a sua conta CarSorte para comprar bilhetes, acompanhar sorteios e guardar o seu histórico.</p>

      <div class="form">
        <input type="text" placeholder="Nome completo">
        <input type="email" placeholder="Email">
        <input type="tel" placeholder="Telefone">
        <select>
          <option>Cidade</option>
          <option>Porto</option>
          <option>Lisboa</option>
          <option>Braga</option>
          <option>Coimbra</option>
        </select>
        <input type="password" placeholder="Palavra-passe">
        <input type="password" placeholder="Confirmar palavra-passe">
        <a class="btn" href="utilizador.html">Criar conta</a>
      </div>

      <div class="links">
        <a href="login.html">Já tenho conta</a>
        <a href="index.html">Voltar ao site</a>
      </div>
    </div>
  </div>

</body>
</html>

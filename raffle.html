<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CarSorte - Comprar Bilhetes</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #333;
background:#111;
color:white;
}

button{
width:100%;
padding:16px;
background:#d4a017;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

img{
width:100%;
border-radius:16px;
margin-bottom:20px;
}

.title{
font-size:28px;
margin-bottom:10px;
}

.price{
font-size:22px;
color:#f4c542;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">Ford Ranger</div>

<img id="raffleImage">

<div class="price">Bilhete: 2.5€</div>

<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Telefone">
<input id="city" placeholder="Cidade">

<input id="qty" type="number" value="1" min="1">

<button onclick="buyTickets()">Comprar Bilhetes</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
doc,
updateDoc,
increment,
serverTimestamp,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD59H109FhXxt3D9pDMy1fSbwPAwrfuPxo",
authDomain: "carsorte.firebaseapp.com",
projectId: "carsorte",
storageBucket: "carsorte.firebasestorage.app",
messagingSenderId: "995392174657",
appId: "1:995392174657:web:df06498ea382e92e6ae4c0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const raffleId = "Ford ranger test"

async function loadRaffle(){

const raffleRef = doc(db,"raffles",raffleId)
const snap = await getDoc(raffleRef)

if(!snap.exists()) return

const raffle = snap.data()

document.getElementById("raffleImage").src = raffle.image

}

loadRaffle()

async function buyTickets(){

const name = document.getElementById("name").value
const email = document.getElementById("email").value
const phone = document.getElementById("phone").value
const city = document.getElementById("city").value
const qty = Number(document.getElementById("qty").value)

try{

const ticketsRef = collection(db,"tickets")
const ordersRef = collection(db,"orders")
const raffleRef = doc(db,"raffles",raffleId)

const snapshot = await getDocs(ticketsRef)

let maxTicket = 0

snapshot.forEach(t=>{
const n = Number(t.data().ticket_number)
if(n > maxTicket) maxTicket = n
})

const createdTickets = []

for(let i=1;i<=qty;i++){

const number = maxTicket + i

await addDoc(ticketsRef,{
raffle_id:raffleId,
buyer:name,
buyer_email:email,
buyer_phone:phone,
buyer_city:city,
ticket_number:number,
created:serverTimestamp()
})

createdTickets.push(number)

}

await addDoc(ordersRef,{
buyer:name,
buyer_email:email,
buyer_phone:phone,
buyer_city:city,
raffle_id:raffleId,
qty:qty,
tickets:createdTickets,
created:serverTimestamp()
})

await updateDoc(raffleRef,{
tickets_sold:increment(qty)
})

alert("Bilhetes comprados: "+createdTickets.join(", "))

}catch(error){

console.error(error)
alert("Erro ao guardar no Firebase")

}

}

window.buyTickets = buyTickets

</script>

</body>
</html>

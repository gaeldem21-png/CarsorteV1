<!doctype html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorteio BMW Série 1</title>

<style>

body{
background:#060606;
color:white;
font-family:Arial;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
color:#f4c542;
}

.hero{
background:#111;
padding:25px;
border-radius:15px;
border:1px solid rgba(255,255,255,.08);
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.hero img{
width:100%;
border-radius:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.stat{
background:#111;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
text-align:center;
}

.progress{
height:10px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:#f4c542;
width:75%;
}

.packs{
margin-top:25px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.pack{
background:#111;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
text-align:center;
}

button{
margin-top:10px;
padding:10px 16px;
border:none;
border-radius:8px;
background:#f4c542;
font-weight:bold;
cursor:pointer;
}

.timer{
margin-top:20px;
font-size:18px;
color:#f4c542;
}

.notification{
position:fixed;
bottom:20px;
left:20px;
background:#111;
padding:10px 14px;
border-radius:8px;
border:1px solid rgba(255,255,255,.1);
}

</style>

</head>

<body>

<div class="container">

<h1>BMW Série 1 Pack M</h1>

<div class="hero">

<div>
<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&w=1200&q=80">
</div>

<div>

<p>Participe no sorteio deste BMW Série 1 por apenas <strong>2,50€</strong>.</p>

<div class="stats">

<div class="stat">
<strong>15000</strong>
<br>
Bilhetes totais
</div>

<div class="stat">
<strong id="sold">11257</strong>
<br>
Vendidos
</div>

<div class="stat">
<strong id="remaining">3743</strong>
<br>
Restantes
</div>

</div>

<div class="progress">
<div class="bar"></div>
</div>

<div class="timer">
Sorteio em <span id="timer"></span>
</div>

</div>

</div>

<h2>Escolha o seu pack</h2>

<div class="packs">

<div class="pack">
<h3>1 bilhete</h3>
<p>2,50€</p>
<a href="checkout.html?pack=1">
<button>Comprar</button>
</a>
</div>

<div class="pack">
<h3>5 bilhetes</h3>
<p>10€</p>
<a href="checkout.html?pack=5">
<button>Comprar</button>
</a>
</div>

<div class="pack">
<h3>10 bilhetes</h3>
<p>20€</p>
<a href="checkout.html?pack=10">
<button>Comprar</button>
</a>
</div>

<div class="pack">
<h3>25 bilhetes</h3>
<p>50€</p>
<a href="checkout.html?pack=25">
<button>Comprar</button>
</a>
</div>

</div>

</div>

<div id="notification" class="notification"></div>

<script>

const endDate = new Date()
endDate.setDate(endDate.getDate()+4)

function updateTimer(){

const now = new Date()
const diff = endDate-now

const days = Math.floor(diff/(1000*60*60*24))
const hours = Math.floor((diff/(1000*60*60))%24)

document.getElementById("timer").innerText = days+" dias "+hours+"h"

}

setInterval(updateTimer,1000)

updateTimer()

const names=["Miguel","João","Carlos","Ana","Rita","Pedro","Tiago","Marta"]

function fakePurchase(){

const name=names[Math.floor(Math.random()*names.length)]
const qty=[1,5,10][Math.floor(Math.random()*3)]

const box=document.getElementById("notification")

box.innerText=name+" comprou "+qty+" bilhetes"

setTimeout(()=>{

box.innerText=""

},4000)

}

setInterval(fakePurchase,7000)

</script>

</body>
</html>

<!doctype html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorteio BMW Série 1</title>

<style>

body{
background:#060606;
color:white;
font-family:Arial;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

.hero{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
background:#111;
padding:30px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
}

.hero img{
width:100%;
border-radius:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.stat{
background:#0b0b0b;
padding:20px;
border-radius:10px;
text-align:center;
}

.progress{
height:10px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:#f4c542;
width:75%;
}

.packs{
margin-top:40px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.pack{
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
}

button{
background:#f4c542;
border:none;
padding:10px 18px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.timer{
margin-top:15px;
color:#f4c542;
}

</style>

</head>

<body>

<div class="container">

<h1>BMW Série 1 Pack M</h1>

<div class="hero">

<div>

<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e">

</div>

<div>

<p>Participe neste sorteio por apenas <strong>2,50€</strong></p>

<div class="stats">

<div class="stat">
<strong>15000</strong>
<br>
Bilhetes totais
</div>

<div class="stat">
<strong id="sold">11257</strong>
<br>
Vendidos
</div>

<div class="stat">
<strong id="remaining">3743</strong>
<br>
Restantes
</div>

</div>

<div class="progress">
<div class="bar"></div>
</div>

<div class="timer">
Sorteio em <span id="timer"></span>
</div>

</div>

</div>

<h2>Escolha o pack</h2>

<div class="packs">

<div class="pack">
<h3>1 bilhete</h3>
<p>2,50€</p>
<a href="checkout.html?pack=1"><button>Comprar</button></a>
</div>

<div class="pack">
<h3>5 bilhetes</h3>
<p>10€</p>
<a href="checkout.html?pack=5"><button>Comprar</button></a>
</div>

<div class="pack">
<h3>10 bilhetes</h3>
<p>20€</p>
<a href="checkout.html?pack=10"><button>Comprar</button></a>
</div>

<div class="pack">
<h3>25 bilhetes</h3>
<p>50€</p>
<a href="checkout.html?pack=25"><button>Comprar</button></a>
</div>

</div>

<br>

<a href="results.html">
<button>Ver último resultado</button>
</a>

</div>

<script>

let sold = 11257

function updateCounter(){

const add = Math.floor(Math.random()*3)

sold = sold + add

if(sold>15000){
sold=15000
}

document.getElementById("sold").innerText=sold
document.getElementById("remaining").innerText=15000-sold

}

setInterval(updateCounter,5000)

const endDate = new Date()
endDate.setDate(endDate.getDate()+4)

function updateTimer(){

const now=new Date()
const diff=endDate-now

const days=Math.floor(diff/(1000*60*60*24))
const hours=Math.floor((diff/(1000*60*60))%24)

document.getElementById("timer").innerText=days+" dias "+hours+"h"

}

setInterval(updateTimer,1000)

updateTimer()

</script>

</body>

</html>

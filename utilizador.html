<!doctype html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Área do utilizador</title>

<style>

body{
background:#060606;
color:white;
font-family:Arial;
margin:0;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
color:#f4c542;
}

.card{
background:#111;
padding:25px;
border-radius:15px;
border:1px solid rgba(255,255,255,.08);
margin-top:20px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.tickets{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

.ticket{
background:#1a1a1a;
padding:8px 10px;
border-radius:8px;
border:1px solid rgba(255,255,255,.08);
font-size:13px;
}

.button{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#f4c542;
color:black;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.stat{
background:#111;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Área do utilizador</h1>

<div class="stats">

<div class="stat">
<strong id="total-tickets">0</strong>
<br>
Bilhetes
</div>

<div class="stat">
<strong>3</strong>
<br>
Sorteios ativos
</div>

<div class="stat">
<strong id="total-spent">0€</strong>
<br>
Total gasto
</div>

</div>

<div class="card">

<h2>Os meus bilhetes</h2>

<div class="tickets" id="tickets"></div>

</div>

<a class="button" href="index.html">Voltar ao site</a>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const pack = params.get("pack") || 5

const prices = {
1:2.5,
5:10,
10:20,
25:50
}

document.getElementById("total-tickets").innerText = pack
document.getElementById("total-spent").innerText = prices[pack]+"€"

function generateTickets(quantity){

const tickets=[]
const start=Math.floor(Math.random()*9000)+1000

for(let i=0;i<quantity;i++){

tickets.push("#CS-"+(start+i))

}

return tickets

}

const tickets = generateTickets(pack)

const container = document.getElementById("tickets")

tickets.forEach(ticket => {

const el=document.createElement("div")
el.className="ticket"
el.innerText=ticket

container.appendChild(el)

})

</script>

</body>
</html>

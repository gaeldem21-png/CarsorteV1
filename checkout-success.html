<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Participação confirmada - CarSorte</title>

  <style>
    :root{
      --bg:#050505;
      --panel:#101010;
      --gold:#d4a017;
      --gold-soft:#f4c542;
      --text:#ffffff;
      --muted:#b8b8b8;
      --line:rgba(255,255,255,.08);
      --shadow:0 14px 34px rgba(0,0,0,.32);
      --green:#29c46d;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#050505;
      color:white;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:40px 20px 60px;
    }

    .card{
      background:#101010;
      padding:40px 24px;
      border-radius:24px;
      box-shadow:0 14px 34px rgba(0,0,0,.32);
      text-align:center;
    }

    .check{
      width:80px;
      height:80px;
      border-radius:20px;
      background:#29c46d;
      color:#03180b;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 20px;
      font-size:40px;
      font-weight:900;
    }

    h1{
      margin:0 0 16px;
      color:#f4c542;
      font-size:42px;
    }

    p{
      color:#b8b8b8;
      line-height:1.8;
      font-size:18px;
      margin:0 auto 24px;
      max-width:680px;
    }

    .subtitle{
      color:white;
      font-size:24px;
      margin:20px 0 14px;
      font-weight:800;
    }

    #tickets{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-top:18px;
    }

    .ticket{
      background:#1a1a1a;
      padding:12px 16px;
      border-radius:12px;
      display:inline-block;
      font-weight:700;
      border:1px solid rgba(255,255,255,.06);
    }

    .resume{
      margin-top:24px;
      padding:18px;
      border-radius:16px;
      background:#151515;
      border:1px solid rgba(255,255,255,.06);
      text-align:left;
    }

    .resume-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .resume-row:last-child{
      border-bottom:none;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      margin-top:30px;
    }

    .btn{
      display:inline-block;
      padding:16px 22px;
      border-radius:14px;
      font-weight:800;
    }

    .btn-primary{
      background:#d4a017;
      color:#000;
    }

    .btn-secondary{
      background:#181818;
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
    }

    @media(max-width:700px){
      h1{font-size:34px}
      p{font-size:16px}
      .actions{flex-direction:column}
      .btn{width:100%}
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="check">✓</div>

    <h1>Participação confirmada 🎉</h1>

    <p>
      A sua participação foi registada com sucesso. Os seus bilhetes foram gerados e associados ao sorteio.
    </p>

    <div class="resume">
      <div class="resume-row">
        <span>Sorteio</span>
        <strong id="raffleTitle">-</strong>
      </div>
      <div class="resume-row">
        <span>Participante</span>
        <strong id="buyerName">-</strong>
      </div>
      <div class="resume-row">
        <span>Quantidade</span>
        <strong id="qty">-</strong>
      </div>
      <div class="resume-row">
        <span>Total</span>
        <strong id="total">-</strong>
      </div>
    </div>

    <div class="subtitle">Os seus bilhetes</div>
    <div id="tickets"></div>

    <div class="actions">
      <a class="btn btn-primary" href="utilizador.html">Ver os meus bilhetes</a>
      <a class="btn btn-secondary" href="index.html">Voltar ao site</a>
    </div>
  </div>
</div>

<script>
const order = JSON.parse(localStorage.getItem("carsorte_last_order") || "{}");

document.getElementById("raffleTitle").textContent = order.raffle_title || "-";
document.getElementById("buyerName").textContent = order.buyer || "-";
document.getElementById("qty").textContent = order.qty ? `${order.qty} bilhete${order.qty > 1 ? "s" : ""}` : "-";
document.getElementById("total").textContent = order.total !== undefined
  ? (Number(order.total) % 1 === 0 ? `${order.total}€` : `${String(order.total).replace(".", ",")}€`)
  : "-";

const ticketsWrap = document.getElementById("tickets");
ticketsWrap.innerHTML = "";

if(order.tickets && Array.isArray(order.tickets) && order.tickets.length){
  order.tickets.forEach(ticketNumber => {
    const div = document.createElement("div");
    div.className = "ticket";
    div.textContent = `Ticket #${ticketNumber}`;
    ticketsWrap.appendChild(div);
  });
} else {
  ticketsWrap.innerHTML = '<div class="ticket">Nenhum bilhete encontrado</div>';
}
</script>

</body>
</html>

<!doctype html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Participação confirmada</title>

<style>

body{
background:#060606;
color:white;
font-family:Arial;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:#111;
padding:40px;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
max-width:700px;
width:90%;
text-align:center;
}

h1{
color:#f4c542;
margin-top:0;
}

.summary{
margin-top:25px;
background:#0b0b0b;
padding:20px;
border-radius:15px;
border:1px solid rgba(255,255,255,.08);
text-align:left;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.tickets{
margin-top:15px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.ticket{
background:#1a1a1a;
padding:8px 10px;
border-radius:8px;
font-size:13px;
border:1px solid rgba(255,255,255,.08);
}

.actions{
margin-top:25px;
}

button{
background:#f4c542;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h1>Participação confirmada</h1>

<p>Os seus bilhetes foram registados com sucesso.</p>

<div class="summary">

<div class="row">
<span>Sorteio</span>
<strong>BMW Série 1 Pack M</strong>
</div>

<div class="row">
<span>Bilhetes</span>
<strong id="ticket-count">5</strong>
</div>

<div class="row">
<span>Total pago</span>
<strong id="ticket-total">10€</strong>
</div>

<div class="tickets" id="tickets"></div>

</div>

<div class="actions">

<a href="utilizador.html">
<button>Ver área do utilizador</button>
</a>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const pack = params.get("pack") || 5

const packPrices = {
1:2.5,
5:10,
10:20,
25:50
}

document.getElementById("ticket-count").innerText = pack
document.getElementById("ticket-total").innerText = packPrices[pack]+"€"

function generateTickets(quantity){

const tickets=[]
const start=Math.floor(Math.random()*9000)+1000

for(let i=0;i<quantity;i++){

tickets.push("#CS-"+(start+i))

}

return tickets

}

const tickets = generateTickets(pack)

const container = document.getElementById("tickets")

tickets.forEach(ticket => {

const el=document.createElement("div")
el.className="ticket"
el.innerText=ticket

container.appendChild(el)

})

</script>

</body>
</html>

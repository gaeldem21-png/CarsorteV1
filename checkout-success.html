<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Participação confirmada</title>

<style>

body{
font-family:Arial;
background:#050505;
color:white;
margin:0;
padding:40px;
text-align:center;
}

.card{
background:#101010;
padding:40px;
border-radius:20px;
max-width:600px;
margin:auto;
}

h1{
color:#f4c542;
}

.ticket{
background:#1b1b1b;
padding:10px;
margin:6px;
border-radius:10px;
display:inline-block;
}

button{
margin-top:20px;
padding:15px 25px;
border:none;
border-radius:10px;
background:#d4a017;
color:black;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h1>Participation confirmée 🎉</h1>

<p>Vos billets pour le tirage :</p>

<div id="tickets"></div>

<button onclick="goUser()">Voir mes billets</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
limit,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyD59H109FhXxt3D9pDMy1fSbwPAwrfuPxo",

authDomain: "carsorte.firebaseapp.com",

projectId: "carsorte",

storageBucket: "carsorte.firebasestorage.app",

messagingSenderId: "995392174657",

appId: "1:995392174657:web:df06498ea382e92e6ae4c0"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



async function loadTickets(){

const q = query(
collection(db,"tickets"),
orderBy("created","desc"),
limit(5)
);

const querySnapshot = await getDocs(q);

const container = document.getElementById("tickets");

querySnapshot.forEach((doc)=>{

const ticket = doc.data();

const div = document.createElement("div");

div.className="ticket";

div.innerText="Ticket #"+ticket.ticket_number;

container.appendChild(div);

});

}

loadTickets();


window.goUser = function(){

window.location.href="utilisateur.html";

}

</script>

</body>
</html>
